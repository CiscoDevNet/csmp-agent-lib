  optional uint32 doDagVersionNumber = 6;
  optional int32 pathEtx = 7;
  optional int32 linkEtx = 8;
  optional sint32 rssiReverse = 10;
  optional int32 lqiForward = 11;
  optional int32 lqiReverse = 12;
  optional int32 hops = 13;
  optional uint32 backupPowerType = 14;
}

// TLV_ID: 55
message GroupAssign{
  optional uint32 type = 1;
  optional uint32 id = 2;
}

// TLV_ID: 56
