// Protocol Buffer definitions for CSMP TLVs
// Google Protobuf version: 3.0
//
// Note: CSMP TLV ProtoBuf definitions will be referred from one common authoritative source
// from the OpenCSMP project in order to maintain parity across all CSMP/ProtoBuf consumers.

syntax = "proto3";
package csmp;

// TLV_ID: 1
message TlvIndex {
  repeated string tlvid = 1 [(nanopb).max_size = 20, (nanopb).max_count = 5];
}

// TLV_ID: 2
message DeviceID {
  optional uint32 type = 1;
  optional string id = 2 [(nanopb).max_size = 128];
}

// TLV_ID: 6
message NMSRedirectRequest {
  optional string url = 1 [(nanopb).max_size = 64];
  optional bool immediate = 2;
}

// TLV_ID: 7
message SessionID {
  optional string id = 1 [(nanopb).max_size = 17];
}

// TLV_ID: 8
message DescriptionRequest {
  repeated string tlvid = 1 [(nanopb).max_size = 8, (nanopb).max_count = 10];
}

// TLV_ID: 10
message HardwareSettings {
  optional int32 entPhysicalIndex = 1;
  optional uint32 entPhysicalFunction = 2;
}

// TLV_ID: 11
message HardwareDesc {
  optional int32 entPhysicalIndex = 1;
  optional string entPhysicalDescr = 2 [(nanopb).max_size = 64];
  optional bytes entPhysicalVendorType = 3 [(nanopb).max_size = 16];
  optional int32 entPhysicalContainedIn = 4;
  optional int32 entPhysicalClass = 5;
  optional int32 entPhysicalParentRelPos = 6;
  optional string entPhysicalName = 7 [(nanopb).max_size = 32];
  optional string entPhysicalHardwareRev = 8 [(nanopb).max_size = 16];
  optional string entPhysicalFirmwareRev = 9 [(nanopb).max_size = 32];
  optional string entPhysicalSoftwareRev = 10 [(nanopb).max_size = 32];
  optional string entPhysicalSerialNum = 11 [(nanopb).max_size = 20];
  optional string entPhysicalMfgName = 12 [(nanopb).max_size = 32];
  optional string entPhysicalModelName = 13 [(nanopb).max_size = 20];
  optional string entPhysicalAssetID = 14 [(nanopb).max_size = 32];
  optional uint32 entPhysicalMfgDate = 15;
  optional string entPhysicalURIs = 16 [(nanopb).max_size = 64];
  optional uint32 entPhysicalFunction = 17;
  optional string entPhysicalOUI = 18 [(nanopb).max_size = 8];
}

// TLV_ID: 12
message InterfaceDesc {
  optional int32 ifIndex = 1;
  optional string ifName = 2 [(nanopb).max_size = 20];
  optional string ifDescr = 3 [(nanopb).max_size = 32];
  optional int32 ifType = 4;
  optional int32 ifMtu = 5;
  optional bytes ifPhysAddress = 6 [(nanopb).max_size = 8];
}

// TLV_ID: 13
message ReportSubscribe {
  optional uint32 interval = 1;
  repeated string tlvid = 2 [(nanopb).max_size = 8, (nanopb).max_count = 40];
}

// TLV_ID: 16
message IPAddress {
  optional int32 ipAddressIndex = 1;
  optional uint32 ipAddressAddrType = 2;
  optional bytes ipAddressAddr = 3 [(nanopb).max_size = 16];
  optional int32 ipAddressIfIndex = 4;
  optional uint32 ipAddressType = 5;
  optional uint32 ipAddressOrigin = 6;
  optional uint32 ipAddressStatus = 7;
  optional uint32 ipAddressCreated = 8;
  optional uint32 ipAddressLastChanged = 9;
  optional uint32 ipAddressPfxLen = 10;
  optional uint32 ipAddressPfrLifetime = 11;
  optional uint32 ipAddressValLifetime = 12;
}

// TLV_ID: 17
message IPRoute {
  optional int32 inetCidrRouteIndex = 1;
  optional uint32 inetCidrRouteDestType = 2;
  optional bytes inetCidrRouteDest = 3 [(nanopb).max_size = 16];
  optional uint32 inetCidrRoutePfxLen = 4;
  optional uint32 inetCidrRouteNextHopType = 5;
  optional bytes inetCidrRouteNextHop = 6 [(nanopb).max_size = 16];
  optional int32 inetCidrRouteIfIndex = 7;
  optional uint32 inetCidrRouteType = 8;
  optional uint32 inetCidrRouteProto = 9;
  optional uint32 inetCidrRouteAge = 10;
}

// TLV_ID: 18
message CurrentTime {
  optional uint32 posix = 1;
  optional string iso8601 = 2 [(nanopb).max_size = 20];
  optional uint32 source = 3;
}

// TLV_ID: 19
message InterfaceSettings {
  optional int32 ifIndex = 1;
  optional uint32 status = 2;
}

message Dwell {
  required uint32 window = 1;
  required uint32 maxdwell = 2;
}

// TLV_ID: 20
message WPANSettings {
  optional int32 ifIndex = 1;
  optional uint32 panid = 2;
  optional uint32 shortAddress = 3;
  optional uint32 bcastSlotsize = 4;
  optional uint32 bcastPeriod = 5;
  optional uint32 neighborProbeRate = 6;
  optional uint32 backoffTimer = 7;
  optional bytes SSID = 8 [(nanopb).max_size = 32];
  optional uint32 mode = 9;
  repeated Notch notchList = 10 [(nanopb).max_count = 4];
  optional Dwell dwell = 11;
}

// TLV_ID: 21
message RPLSettings {
  optional int32 ifIndex = 1;
  optional bool enabled = 2;
  optional uint32 dioIntervalMin = 3;
  optional uint32 dioIntervalMax = 4;
  optional uint32 daoIntervalMin = 5;
  optional uint32 daoIntervalMax = 6;
  optional uint32 mopType = 7;
  optional uint32 daoGroupAddrComp = 8;
  optional uint32 instanceIndex = 9;
}

// TLV_ID: 22
message Uptime {
  optional uint32 sysUpTime = 1;
}

// TLV_ID: 23
message InterfaceMetrics {
  optional int32 ifIndex = 1;
  optional uint32 ifInSpeed = 2;
  optional uint32 ifOutSpeed = 3;
  optional uint32 ifAdminStatus = 4;
  optional uint32 ifOperStatus = 5;
  optional uint32 ifLastChange = 6;
  optional uint32 ifInOctets = 7;
  optional uint32 ifOutOctets = 8;
  optional uint32 ifInDiscards = 9;
  optional uint32 ifInErrors = 10;
  optional uint32 ifOutDiscards = 11;
  optional uint32 ifOutErrors = 12;
}

// TLV_ID: 24
message InterfaceDetailMetrics {
  optional int32 ifIndex = 1;
  optional uint32 ifInUcastPkts = 2;
  optional uint32 ifInBroadcastPkts = 3;
  optional uint32 ifInMulticastPkts = 4;
  optional uint32 ifInUnknownProtos = 5;
  optional uint32 ifOutUcastPkts = 6;
  optional uint32 ifOutBroadcastPkts = 7;
  optional uint32 ifOutMulticastPkts = 8;
  optional uint32 ifOutQLen = 9;
}

message PhyModeInfo {
  optional uint32 phyMode = 1;
  optional int32  txPower = 2;
}

message ToneMap {
  required uint32 modulation = 1;
  required uint32 txres = 2;
  required uint32 txgain = 3;
  required bytes map = 4 [(nanopb).max_size = 1];
  required bytes txcoeff = 5 [(nanopb).max_size = 6];
  required bool lock = 6;
}

// TLV_ID: 25
message IPRouteRPLMetrics {
  optional int32 inetCidrRouteIndex = 1;
  optional int32 instanceIndex = 2;
  optional int32 rank = 3;
  optional int32 hops = 4;
  optional int32 pathEtx = 5;
  optional int32 linkEtx = 6;
  optional sint32 rssiForward = 7;
  optional sint32 rssiReverse = 8;
  optional int32 lqiForward = 9;
  optional int32 lqiReverse = 10;
  optional uint32 dagSize = 11;
  optional ToneMap tmForward = 12;
  optional ToneMap tmReverse = 13;
  optional uint32 dphase = 14;
  optional uint32 aphase = 15;
  optional int32 pathEtt = 16;
  optional int32 linkEtt = 17;
  optional PhyModeInfo phyModeForward = 18;
  optional PhyModeInfo phyModeReverse = 19;
}

// TLV_ID: 28
message EchoRequest {
  optional string data = 1 [(nanopb).max_size = 128];
}

// TLV_ID: 29
message EchoResponse {
  optional string data = 1 [(nanopb).max_size = 128];
}

// TLV_ID: 30
message PingRequest {
  optional string dest = 1 [(nanopb).max_size = 64];
  optional uint32 count = 2 [default = 5];
  optional uint32 delay = 3 [default = 1];
}

// TLV_ID: 31
message PingResponse {
  optional uint32 sent = 1;
  optional uint32 received = 2;
  optional uint32 minRtt = 3;
  optional uint32 meanRtt = 4;
  optional uint32 maxRtt = 5;
  optional uint32 stdevRtt = 6;
  optional string src = 7 [(nanopb).max_size = 64];
}

// TLV_ID: 32
message RebootRequest {
  optional uint32 flag = 1;
}

// TLV_ID: 33
message Ieee8021xStatus {
  optional int32 ifIndex = 1;
  optional bool enabled = 2;
  optional string identity = 3 [(nanopb).max_size = 32];
  optional uint32 state = 4;
  optional bytes pmkId = 5 [(nanopb).max_size = 16];
  optional bool clientCertValid = 6;
  optional bool caCertValid = 7;
  optional bool privateKeyValid = 8;
  optional uint32 rlyPanid = 9;
  optional bytes rlyAddress = 10 [(nanopb).max_size = 8];
  optional uint32 rlyLastHeard = 11;
}

// TLV_ID: 34
message Ieee80211iStatus {
  optional int32 ifIndex = 1;
  optional bool enabled = 2;
  optional bytes pmkId = 3 [(nanopb).max_size = 16];
  optional bytes ptkId = 4 [(nanopb).max_size = 16];
  optional int32 gtkIndex = 5;
  optional bool gtkAllFresh = 6;
  repeated bytes gtkList = 7 [(nanopb).max_size = 16, (nanopb).max_count = 7];
  repeated uint32 gtkLifetimes = 8 [(nanopb).max_count = 7];
  optional bytes authAddress = 9 [(nanopb).max_size = 8];
  optional uint32 framecounter = 10;
}

// TLV_ID: 35
message WPANStatus {
  optional int32 ifIndex = 1;
  optional bytes SSID = 2 [(nanopb).max_size = 32];
  optional uint32 panid = 3;
  optional bool primary = 4;
  optional bool dot1xEnabled = 5;
  optional uint32 securityLevel = 6;
  optional uint32 rank = 7;
  optional bool beaconValid = 8;
  optional uint32 beaconVersion = 9;
  optional uint32 beaconAge = 10;
  optional int32 txPower = 11;
  optional uint32 dagSize = 12;
  optional uint32 metric = 13;
  optional uint32 lastChanged = 14;
  optional uint32 lastChangedReason = 15;
  optional bool demoModeEnabled = 16 [default = false];
  optional bool txFec = 17;
  optional uint32 phyMode = 18;
  repeated PhyModeInfo phyModeList = 20 [(nanopb).max_count = 10];
  optional uint32 bandID = 21;
  optional uint32 networkScale = 25;
}

// TLV_ID: 36
message DHCP6ClientStatus {
  optional int32 ifIndex = 1;
  optional uint32 ianaIAID = 2;
  optional uint32 ianaT1 = 3;
  optional uint32 ianaT2 = 4;
}

// TLV_ID: 37
message RadioLinkStats {
  optional int32 ifIndex = 1;
  optional int32 devIndex = 2;
  optional uint32 inBytes = 3;
  optional uint32 outBytes = 4;
  optional uint32 inFrames = 5;
  optional uint32 outFrames = 6;
  optional uint32 inCrcErrors = 7;
  optional uint32 inRxFifoErrors = 8;
  optional uint32 inPktLenErrors = 9;
  optional uint32 inPhyHdrErrors = 10;
  optional uint32 outTxFifoErrors = 11;
  optional uint32 outCcaBusyDiscards = 12;
}

// TLV_ID: 38
message Ieee802154DevLinkStats {
  optional int32 ifIndex = 1;
  optional int32 devIndex = 2;
  optional uint32 inNullIeErrors = 3;
  optional uint32 outSendErrors = 4;
  optional uint32 outOutageErrors = 5;
  optional uint32 outNoNbrErrors = 6;
  optional uint32 outBcastInvalidErrors = 7;
}

// TLV_ID: 39
message Ieee802154LinkStats {
  optional int32 ifIndex = 1;
  optional uint32 inAddressFilterings = 2;
  optional uint32 inPanidFilterings = 3;
  optional uint32 inSecurityErrors = 4;
  optional uint32 inPktLenErrors = 5;
  optional uint32 outSendErrors = 6;
  optional uint32 outNoNbrErrors = 7;
  optional uint32 panChanges = 8;

  optional uint32 inFrames = 10;

  optional uint32 inFramesBeacon = 11;
  optional uint32 inFramesData = 12;
  optional uint32 inFramesAck = 13;
  optional uint32 inFramesCmd = 14;

  optional uint32 outFrames = 20;

  optional uint32 outFramesAsync = 21;
  optional uint32 outFramesBcast = 22;
  optional uint32 outFramesUcast = 23;

  optional uint32 outFramesBeacon = 24;
  optional uint32 outFramesData = 25;
  optional uint32 outFramesAck = 26;
  optional uint32 outFramesCmd = 27;

  optional uint32 inPktDups = 28;
}

// TLV_ID: 40
message WPANLinkStats {
  optional int32 ifIndex = 1;
  optional uint32 inHdrDecompressErrors = 2;
  optional uint32 inPktLenErrors = 3;
  optional uint32 inBufferFullDiscards = 4;
  optional uint32 outSendErrors = 5;
  optional uint32 outPktLenErrors = 6;
  optional uint32 outPktSecErrors = 7;
  optional uint32 outHdrCompressErrors = 8;
}

// TLV_ID: 41
message PPPLinkStats {
  optional int32 ifIndex = 1;
  optional uint32 inBufferFullDiscards = 2;
  optional uint32 inPktLenErrors = 3;
  optional uint32 inDiscards = 4;
  optional uint32 outBufferFullDiscards = 5;
  optional uint32 outSendErrors = 6;
}

// TLV_ID: 42
message CGMSSettings {
  optional uint32 regIntervalMin = 1;
  optional uint32 regIntervalMax = 2;
