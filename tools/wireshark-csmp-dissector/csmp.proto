}

// TLV_ID: 44
message CGMSNotification {
  optional uint32 code = 1;
//optional uint32 subcode = 2;
  repeated uint32 tlvs = 3 [(nanopb).max_count = 20];
}

// TLV_ID: 45
message CGMSStats {
  optional uint32 sigOk = 1;
  optional uint32 sigBadAuth = 2;
  optional uint32 sigBadValidity = 3;
  optional uint32 sigNoSync = 4;
  optional uint32 regSucceed = 5;
  optional uint32 regAttempts = 6;
  optional uint32 regHolds = 7;
  optional uint32 regFails = 8;
  optional uint32 nmsErrors = 9;
}

// TLV_ID: 46
message PPPSettings {
