  optional uint32 in_req = 2;
  optional uint32 in_resp = 3;
  optional uint32 in_error_map = 4;
  optional uint32 out_resp = 5;
  optional uint32 out_no_nbr = 6;
  optional uint32 out_error = 7;
  optional uint32 out_error_map = 8;
  optional uint32 in_resp_map_changes = 9;
  optional uint32 in_resp_mcs_changes = 10;
