  optional uint32 inFramesPC = 14;
  optional uint32 inFramesLPAS = 15;
  optional uint32 inFramesLPA = 16;
  optional uint32 inFramesLPCS = 17;
  optional uint32 inFramesLPC = 18;

  optional uint32 outFrames = 20;
  optional uint32 outFramesPAS = 21;
  optional uint32 outFramesPA = 22;
  optional uint32 outFramesPCS = 23;
  optional uint32 outFramesPC = 24;
  optional uint32 outFramesLPAS = 25;
  optional uint32 outFramesLPA = 26;
  optional uint32 outFramesLPCS = 27;
