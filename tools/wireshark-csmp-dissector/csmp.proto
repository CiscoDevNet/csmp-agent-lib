  optional bool reqValidCheckPost = 2;
  optional bool reqTimeSyncPost = 3;
  optional bool reqSecLocalPost = 4;
  optional bool reqSignedResp = 5;
  optional bool reqValidCheckResp = 6;
  optional bool reqTimeSyncResp = 7;
  optional bool reqSecLocalResp = 8;
  optional bytes cert = 9 [(nanopb).max_size = 512];
}

// TLV_ID: 80
message Ieee8021xAAASec {
