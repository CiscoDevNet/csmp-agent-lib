  optional bytes physAddress = 2 [(nanopb).max_size = 8];
  optional uint32 lastChanged = 3;
  optional sint32 rssiForward = 4;
  optional sint32 rssiReverse = 5;
  optional uint32 lqiForward  = 9;
  optional uint32 lqiReverse = 10;
  optional uint32 etx    = 11;
  optional uint32 sent   = 12;
  optional uint32 acked  = 13;
  optional uint32 pin    = 14;
  // optional uint32 stable = 15;
  optional uint32 phymodeForward = 16;
  optional uint32 phymodeReverse = 17;
  optional sint32 lastRssiForward = 18;
  optional sint32 lastRssiReverse = 19;
  optional uint32 lastLqiForward = 20;
  optional uint32 lastLqiReverse = 21;
  optional uint32 phySent = 22;
