  optional int32 instanceId = 2;
  optional bytes doDagId = 3 [(nanopb).max_size = 16];
  optional int32 doDagVersionNumber = 4;
  optional int32 rank = 5;
  optional int32 parentCount = 6;
  optional uint32 dagSize = 7;
